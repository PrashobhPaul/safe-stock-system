name: 📈 Daily Stock Analysis

on:
  schedule:
    - cron: "45 10 * * 1-5"
  workflow_dispatch:

jobs:
  analyze:
    name: Fetch · Score · Save
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies directly
        run: |
          python -m pip install --upgrade pip
          pip install yfinance==0.2.36 pandas numpy requests pytz

      - name: Run analysis and save predictions.json
        run: |
          cd $GITHUB_WORKSPACE
          python api/quotes_daily.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Commit predictions.json
        run: |
          git config --global user.name  "stocksage-bot"
          git config --global user.email "bot@stocksage.india"
          git add predictions.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            IST=$(TZ='Asia/Kolkata' date '+%Y-%m-%d %H:%M IST')
            git commit -m "📈 Daily predictions — ${IST}"
            git push
            echo "✅ predictions.json saved and pushed"
          fi

      - name: Summary
        if: always()
        run: |
          echo "## 📈 StockSage Daily Analysis" >> $GITHUB_STEP_SUMMARY
          python - << 'PYEOF' >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "Summary unavailable"
          import json
          try:
              with open("predictions.json") as f:
                  d = json.load(f)
              print(f"**Date:** {d.get('market_date','?')}")
              print(f"**Stocks analyzed:** {d.get('stocks_analyzed','?')}")
              print()
              for cat, label in [("short_term","⚡ Short"),("medium_term","📈 Medium"),("long_term","🏛 Long")]:
                  picks = d.get(cat,{}).get("picks",[])
                  if not picks: continue
                  print(f"### {label} Term")
                  print("| # | Symbol | Score | Signal | Entry | Target | Hold |")
                  print("|---|--------|-------|--------|-------|--------|------|")
                  for p in picks:
                      ep = p.get("trade_plan",{}).get("entry",{}).get("ideal_price","—")
                      tp = p.get("trade_plan",{}).get("exit",{}).get("target_ideal","—")
                      hd = p.get("trade_plan",{}).get("exit",{}).get("hold_duration","—")
                      print(f"| {p['rank']} | **{p['symbol']}** | {p['score']} | {p['signal']} | {ep} | {tp} | {hd} |")
                  print()
          except Exception as e:
              print(f"Error: {e}")
          PYEOF
